<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Authentication System</title>

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<!-- 🌙 Dark Mode Toggle -->
<div class="position-absolute top-0 end-0 p-3">
    <button class="btn btn-dark btn-sm" onclick="toggleDarkMode()" id="darkBtn">
        🌙
    </button>
</div>

<!-- ===== Center Container ===== -->
<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <!-- ===== Login Card ===== -->
    <div class="card shadow-lg p-4" style="width: 380px;">

        <!-- Title -->
        <div class="text-center mb-3">
            <h2 class="fw-bold text-primary">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </h2>
            <p class="text-muted">Welcome back</p>
        </div>

        <!-- Form -->
        <form>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Email / Username</label>
                <input type="text" class="form-control" placeholder="Enter username" required
                oninvalid="this.setCustomValidity('Please enter your username')"
                oninput="this.setCustomValidity('')">
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                    <span class="input-group-text" onclick="toggleLoginPassword()">
                        <i class="bi bi-eye" id="loginEye"></i>
                    </span>
                </div>
            </div>

            <!-- Login Button -->
            <button class="btn btn-primary w-100 fw-bold mt-2" onclick="loginLoading(event)">
                <span id="loginText">Login</span>
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>

        </form>

        <!-- Links -->
        <div class="text-center mt-3">
            <a href="forgot-password.html" class="text-decoration-none d-block">Forgot Password?</a>
            <a href="register.html" class="text-decoration-none">Create New Account</a>
        </div>

    </div>

</div>

<!-- Footer -->
<div class="text-center mt-3 text-muted">
    <small>© 2026 Authentication System | Designed by Nashita</small>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script>
function toggleLoginPassword() {
    const field = document.getElementById("loginPassword");
    const icon = document.getElementById("loginEye");

    if (field.type === "password") {
        field.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        field.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

function loginLoading(event) {
    event.preventDefault();

    document.getElementById("loginText").textContent = "Logging in...";
    document.getElementById("loginSpinner").classList.remove("d-none");

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1200);
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    const btn = document.getElementById("darkBtn");

    if (document.body.classList.contains("dark-mode")) {
        btn.textContent = "☀️";
    } else {
        btn.textContent = "🌙";
    }
}
</script>

</body>
</html>
