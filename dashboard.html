<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>

    <!-- Responsive Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-speedometer2"></i> My Dashboard
    </span>
    <a href="index.html" class="btn btn-outline-light">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</nav>

<!-- ===== Main Content ===== -->
<div class="container mt-5 mb-5">

    <!-- ===== Welcome Card ===== -->
    <div class="card shadow-lg p-4 text-center">
        <h2 class="text-success fw-bold">
            <i class="bi bi-check-circle"></i> Welcome 🎉
        </h2>
        <p class="text-muted">You have successfully logged in to your dashboard</p>
    </div>

    <!-- ===== Features Section ===== -->
    <div class="row mt-4">

        <!-- Profile Card -->
        <div class="col-md-6 col-lg-4 mb-3">
            <div class="card p-3 text-center shadow">
                <i class="bi bi-person fs-1 text-primary"></i>
                <h5 class="mt-2">Profile</h5>
                <p class="text-muted">Manage your account details</p>
            </div>
        </div>

        <!-- Settings Card -->
        <div class="col-md-6 col-lg-4 mb-3">
            <div class="card p-3 text-center shadow">
                <i class="bi bi-gear fs-1 text-warning"></i>
                <h5 class="mt-2">Settings</h5>
                <p class="text-muted">Customize your preferences</p>
            </div>
        </div>

        <!-- Help Card -->
        <div class="col-md-6 col-lg-4 mb-3">
            <div class="card p-3 text-center shadow">
                <i class="bi bi-info-circle fs-1 text-danger"></i>
                <h5 class="mt-2">Help</h5>
                <p class="text-muted">Get support and assistance</p>
            </div>
        </div>

    </div>

</div>

<!-- ===== Footer ===== -->
<div class="text-center mt-5 mb-3 text-muted">
    <small>© 2026 Authentication System | Designed by Nashita</small>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
