<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===== Center Container ===== -->
<div class="container-center">

    <!-- ===== Card ===== -->
    <div class="card shadow-lg p-4" style="width: 350px; background-color: white;">

        <!-- ===== Title ===== -->
        <div class="text-center mb-3">
            <h3 class="text-danger fw-bold">Reset Password</h3>
            <p class="text-muted">Enter your new password</p>
        </div>

        <!-- ===== Form ===== -->
        <form>

            <!-- New Password -->
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control" placeholder="Enter new password" required>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-shield-lock"></i>
                    </span>
                    <input type="password" class="form-control" placeholder="Confirm new password" required>
                </div>
            </div>

            <!-- Reset Button -->
            <a href="index.html" class="btn btn-danger w-100 fw-bold">
                <i class="bi bi-arrow-repeat"></i> Reset Password
            </a>

        </form>

        <!-- Back to Login -->
        <div class="text-center mt-3">
            <a href="index.html" class="text-decoration-none">Back to Login</a>
        </div>

    </div>

</div>

<!-- Footer -->
<div class="text-center mt-3 text-light">
    <small>© 2026 Authentication System | Designed by Nashita</small>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
